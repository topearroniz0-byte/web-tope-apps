<!DOCTYPE html>
<html lang="es">
<head>

    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tope Systems | Repository</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-ML62SHGP"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    
    <div class="main-wrapper">
        <header class="main-header">
            <button id="btnAdminLogin" class="auth-btn">Admin Auth</button>
            
            <div class="header-center-block">
                <img src="logo_tope_systems.png" alt="Tope Systems Logo" class="logo-image">
                <div class="title-text-group">
                    <h1>TOPE <span>SYSTEMS</span></h1>
                    <p>Advanced Software & Script Repository</p>
                </div>
            </div>
        </header>

        <section id="adminPanel" class="admin-console" style="display: none;">
            <div id="adminContent"></div>
        </section>

        <main class="content-wrapper">
            <div class="repo-controls">
                <nav class="repo-filters">
                    <button class="filter-btn active" data-category="all">Todos</button> 
                    <button class="filter-btn" data-category="pc">Windows</button>
                    <button class="filter-btn" data-category="android">Android</button>
                    <button class="filter-btn" data-category="multi">Multi</button>
                </nav>
                <div class="search-box">
                    <input type="text" id="appSearch" placeholder="Buscar software...">
                </div>
            </div>
            
            <div id="appContainer" class="repo-grid">
                </div>
        </main>

        <footer class="main-footer">
            <p>&copy; 2026 Tope Systems. Calidad y rendimiento.</p>
        </footer>
    </div>

    <script src="script.js"></script>
